<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact — Sreevathsan</title>

  <script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>

  <style>
    *, *::before, *::after {
      box-sizing: border-box;
    }

    body {
      background: #0a0a0a;
      color: #fff;
      font-family: 'DM Mono', monospace;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
      margin: 0;
    }

    .form-container {
      width: 100%;
      max-width: 420px;
      padding: 30px;
      background: #111;
      border: 1px solid #333;
      border-radius: 10px;
    }

    h2 {
      margin: 0 0 20px;
      color: #e8c547;
      font-size: clamp(1.1rem, 5vw, 1.4rem);
    }

    input, textarea {
      width: 100%;
      padding: 10px;
      margin-bottom: 12px;
      background: #0a0a0a;
      border: 1px solid #333;
      color: white;
      font-family: inherit;
      font-size: 14px;
      border-radius: 4px;
    }

    input:focus, textarea:focus {
      outline: none;
      border-color: #555;
    }

    textarea {
      resize: vertical;
      min-height: 100px;
    }

    button {
      width: 100%;
      padding: 12px;
      background: #e8c547;
      border: none;
      color: black;
      cursor: pointer;
      font-family: inherit;
      font-size: 14px;
      font-weight: bold;
      border-radius: 4px;
    }

    button:hover {
      opacity: 0.8;
    }

    .back {
      display: block;
      margin-bottom: 16px;
      color: #aaa;
      text-decoration: none;
      font-size: 12px;
    }

    .back:hover {
      color: #fff;
    }

    @media (max-width: 480px) {
      .form-container {
        padding: 20px 16px;
      }
    }
  </style>
</head>

<body>

<div class="form-container">

  <a href="index.html" class="back">← Back to Portfolio</a>

  <h2>Send me a message</h2>

  <form id="contact-form">
    <input type="text" name="name" placeholder="Your Name" required>
    <input type="email" name="email" placeholder="Your Email" required>
    <textarea name="message" rows="4" placeholder="Your Message" required></textarea>
    <button type="submit">Send Message</button>
  </form>

</div>

<script>
  (function(){
    emailjs.init("KEiU7_6SqdO_jfBxY");
  })();

  document.getElementById("contact-form").addEventListener("submit", function(e) {
    e.preventDefault();

    emailjs.sendForm("service_20va5s", "template_901b9o6", this)
      .then(() => {
        alert("Message sent successfully!");
        this.reset();
      }, (error) => {
        alert("Failed to send message");
        console.log(error);
      });
  });
</script>

</body>
</html>
